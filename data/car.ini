[HEADER]
VERSION=2		;version number

[INFO]
SCREEN_NAME=Peugeot 308 Racing Cup
SHORT_NAME=Peugeot 308 RC

[BASIC]
GRAPHICS_OFFSET=0,-0.475,-0.248			; 3 axis correction (x,y,z), applies only to the 3D object of the car. in meters
GRAPHICS_PITCH_ROTATION=-0.1				; changes 3D object rotation in pitch
TOTALMASS=1100							; total vehicle weight in kg with driver and no fuel
INERTIA=1.70,1.18,3.82						; car polar inertia. Calculated from the car dimensions. Just enter the generic width,height. 

[GRAPHICS]
DRIVEREYES=0.347672,1.06749,-0.258561
ONBOARD_EXPOSURE=20
OUTBOARD_EXPOSURE=30
ON_BOARD_PITCH_ANGLE=-5.035234
BUMPER_CAMERA_POS=0.000000,0.100000,2.170000
BONNET_CAMERA_POS=0.000000,0.470000,1.250000
MIRROR_POSITION=0.0,1.04,-2.0				; Position used to render the mirror
SHAKE_MUL=2.0
USE_ANIMATED_SUSPENSIONS=1
FUEL_LIGHT_MIN_LITERS=10
BONNET_CAMERA_PITCH=0.000000
BUMPER_CAMERA_PITCH=4.010637
CHASE_CAMERA_PITCH=0.000000

[CONTROLS]
FFMULT=1.00				; Force Feedback power multiplier
STEER_ASSIST=1.0						; Variable steer assist, speed relative
STEER_LOCK=200							; Real car's steer lock from center to right
STEER_RATIO=9.5							; Steer ratio
LINEAR_STEER_ROD_RATIO=-0.0020			; Because of AC complex suspension geometry, you need to calculate manually the steer rod ratio
; Enter AC in dev app mode enabled
; Open SUSPENSIONS app
; turn your steering wheel by 90 degrees
; check the actual steer ratio value
; modify LINEAR_STEER_ROD_RATIO value until ingame steer ratio and car.ini STEER_RATIO values are similar


[FUEL]
CONSUMPTION=0.0016					; fuel consumption. In one second the consumption is (rpm*gas*CONSUMPTION)/1000 litres
FUEL=20									; default starting fuel in litres
MAX_FUEL=100								; max fuel in litres

[FUELTANK]
POSITION=0,-0.24,-1.24	

[RIDE]
PICKUP_FRONT_HEIGHT=-0.370				; Height of the front ride height pickup point in meters WRT cg
PICKUP_REAR_HEIGHT=-0.368				; Height of the rear ride height pickup point in meters WRT cg

[RULES]

MIN_HEIGHT=0.080   						; meters min height front/rear

[PIT_STOP]

TYRE_CHANGE_TIME_SEC=8           		; time spent to change each tyre
FUEL_LITER_TIME_SEC=1.2   				; time spent to put 1 lt of fuel inside the car
BODY_REPAIR_TIME_SEC=4    				; time spent to repair 10% of body damage
ENGINE_REPAIR_TIME_SEC=5  				; time spent to repair 10% of engine damage
SUSP_REPAIR_TIME_SEC=3   				; time spent to repair 10% of suspension damage
